name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Build
        run: dotnet build dotnet-coupling.slnx --configuration Release --no-restore

  test:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Test
        run: dotnet test dotnet-coupling.slnx --configuration Release --no-restore --no-build --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults/Coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/Coverage/**/*.xml
          if-no-files-found: error
          retention-days: 14

  format:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Format
        run: dotnet format dotnet-coupling.slnx --verify-no-changes --no-restore

  mutation:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Restore tools
        run: dotnet tool restore

      - name: Mutation test
        run: dotnet tool run dotnet-stryker -- --config-file stryker-config.json

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: StrykerOutput/**
          if-no-files-found: error
          retention-days: 14
