name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx

      - name: Build
        run: dotnet build dotnet-coupling.slnx --configuration Release --no-restore

      - name: Format
        run: dotnet format dotnet-coupling.slnx --verify-no-changes --no-restore
      
      - name: Test
        run: dotnet test dotnet-coupling.slnx --configuration Release --no-restore --no-build
