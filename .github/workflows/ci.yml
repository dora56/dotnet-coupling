name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      docs_only: ${{ steps.changed-files.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          non_docs_files="$(
            printf '%s\n' "$changed_files" |
              grep -Ev '^(docs/|\.agents/|README\.md|AGENTS\.md|LICENSE$|[^/]+\.md$)' || true
          )"

          if [[ -z "$non_docs_files" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-slim
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Build
        run: dotnet build dotnet-coupling.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/DotnetCoupling.Cli/DotnetCoupling.Cli.csproj --configuration Release --no-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            src/**/bin/Release/**
            src/**/obj/Release/**
            tests/**/bin/Release/**
            tests/**/obj/Release/**
            src/DotnetCoupling.Cli/nupkg/*.nupkg
          if-no-files-found: error
          retention-days: 14

  test:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: Restore executable bits
        shell: bash
        run: |
          find tests -type f -path '*/bin/Release/*' -exec chmod +x {} +

      - name: Test
        run: dotnet test dotnet-coupling.slnx --configuration Release --no-restore --no-build --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults/Coverage

      - name: Stage coverage report
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/coverage
          mapfile -t coverage_reports < <(find . -type f -name 'coverage.cobertura.xml' \
            -not -path './artifacts/coverage/*' | sort)

          if [[ "${#coverage_reports[@]}" -eq 0 ]]; then
            echo "No coverage report was generated." >&2
            exit 1
          fi

          for report in "${coverage_reports[@]}"; do
            cp "$report" "artifacts/coverage/$(basename "$(dirname "$report")").coverage.cobertura.xml"
          done

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: artifacts/coverage
          if-no-files-found: error
          retention-days: 14

  format:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Format
        run: dotnet format dotnet-coupling.slnx --verify-no-changes --no-restore

  mutation:
    runs-on: ubuntu-slim
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Restore tools
        run: dotnet tool restore

      - name: Determine mutation scope
        id: mutation-scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "args=--since:${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Mutation test
        run: dotnet tool run dotnet-stryker -- --config-file stryker-config.json ${{ steps.mutation-scope.outputs.args }}

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: StrykerOutput/**
          if-no-files-found: error
          retention-days: 14

  self-benchmark:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: Read package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' Directory.Build.props | head -n 1)"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"

      - name: Install local tool
        run: |
          TOOL_PATH="$(mktemp -d)"
          echo "TOOL_PATH=$TOOL_PATH" >> "$GITHUB_ENV"
          dotnet tool install dotnet-coupling --tool-path "$TOOL_PATH" --add-source src/DotnetCoupling.Cli/nupkg --version "$PACKAGE_VERSION"

      - name: Self-benchmark
        run: |
          "$TOOL_PATH/dotnet-coupling" --check --min-grade A --no-git ./src

  report:
    runs-on: ubuntu-slim
    needs:
      - changes
      - test
      - mutation
      - self-benchmark
    if: always() && needs.changes.outputs.docs_only != 'true'
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download coverage report
        uses: actions/download-artifact@v8.0.1
        with:
          name: coverage-report
          path: artifacts/coverage

      - name: Download mutation report
        uses: actions/download-artifact@v8.0.1
        with:
          name: mutation-report
          path: artifacts/mutation

      - name: Generate CI summary
        shell: bash
        run: |
          scripts/generate-ci-summary.sh \
            --coverage-dir artifacts/coverage \
            --mutation-dir artifacts/mutation \
            | tee ci-summary.md | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const marker = '<!-- dotnet-coupling-ci-report -->';
            const body = fs.readFileSync('ci-summary.md', 'utf8');
            const commentBody = `${marker}\n${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }
