name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      docs_only: ${{ steps.changed-files.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if [[ -z "$changed_files" ]]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          non_docs_files="$(
            printf '%s\n' "$changed_files" |
              grep -Ev '^(docs/|\.agents/|README\.md|AGENTS\.md|LICENSE$|[^/]+\.md$)' || true
          )"

          if [[ -z "$non_docs_files" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-slim
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Build
        run: dotnet build dotnet-coupling.slnx --configuration Release --no-restore

  test:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Test
        run: dotnet test dotnet-coupling.slnx --configuration Release --no-restore --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults/Coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/Coverage/**/*.xml
          if-no-files-found: error
          retention-days: 14

  format:
    runs-on: ubuntu-slim
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Format
        run: dotnet format dotnet-coupling.slnx --verify-no-changes --no-restore

  mutation:
    runs-on: ubuntu-slim
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache .NET dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/toolResolverCache
          key: dotnet-${{ runner.os }}-${{ hashFiles('dotnet-coupling.slnx', '**/*.csproj', '**/packages.lock.json', 'Directory.Build.*', '.config/dotnet-tools.json') }}
          restore-keys: |
            dotnet-${{ runner.os }}-

      - name: Restore
        run: dotnet restore dotnet-coupling.slnx --locked-mode

      - name: Restore tools
        run: dotnet tool restore

      - name: Mutation test
        run: dotnet tool run dotnet-stryker -- --config-file stryker-config.json

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: StrykerOutput/**
          if-no-files-found: error
          retention-days: 14
